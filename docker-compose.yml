version: "3.9"

# Tüm hassas değerler .env dosyasından okunur
# Kurulum: cp .env.example .env → değerleri doldurun → docker compose up -d

services:

  # -------------------------
  # MongoDB (Graylog metadata)
  # -------------------------
  mongo:
    image: mongo:4.4 # 5.0+ AVX gerektirir — AVX'siz CPU için 4.4 kullan
    container_name: mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: [ "CMD", "mongo", "--eval", "db.adminCommand('ping')" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # -------------------------
  # OpenSearch (log indeksleme motoru)
  # -------------------------
  opensearch:
    image: opensearchproject/opensearch:2.12.0
    container_name: opensearch
    environment:
      - discovery.type=single-node
      - plugins.security.disabled=true
      - bootstrap.memory_lock=true
      - OPENSEARCH_JAVA_OPTS=-Xms1g -Xmx1g
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=${OPENSEARCH_ADMIN_PASSWORD} # 2.12.0+ zorunlu
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1" ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  # -------------------------
  # Graylog (log yönetimi UI + işleme)
  # -------------------------
  graylog:
    image: graylog/graylog:4.3
    container_name: graylog
    depends_on:
      mongo:
        condition: service_healthy
      opensearch:
        condition: service_healthy
    environment:
      - GRAYLOG_PASSWORD_SECRET=${GRAYLOG_PASSWORD_SECRET}
      - GRAYLOG_ROOT_PASSWORD_SHA2=${GRAYLOG_ROOT_PASSWORD_SHA2}
      - GRAYLOG_HTTP_EXTERNAL_URI=http://${SERVER_IP}:9000/
    ports:
      - "9000:9000" # Web UI
      - "1514:1514/udp" # Syslog input (pfSense)
      - "12201:12201/udp" # GELF input (opsiyonel)
    restart: unless-stopped

  # -------------------------
  # Prometheus (metrik toplama)
  # -------------------------
  prometheus:
    image: prom/prometheus
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    restart: unless-stopped

  # -------------------------
  # Node Exporter (sunucu sistem metrikleri)
  # -------------------------
  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    restart: unless-stopped
    pid: host # host PID namespace (doğru metrik için)
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    ports:
      - "9100:9100"

  # -------------------------
  # Grafana (dashboard & görselleştirme)
  # -------------------------
  grafana:
    image: grafana/grafana
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    restart: unless-stopped

# -------------------------
# Kalıcı birimler
# -------------------------
volumes:
  mongo_data:
  opensearch_data:
  grafana_data:
