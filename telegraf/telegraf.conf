# ============================================================
# Telegraf Konfigürasyonu
# Prometheus metriklerini scrape eder → InfluxDB'ye yazar
# ============================================================

[global_tags]
  env = "production"

[agent]
  interval = "15s"
  round_interval = true
  metric_batch_size = 1000
  metric_buffer_limit = 10000
  collection_jitter = "2s"
  flush_interval = "15s"
  flush_jitter = "5s"
  precision = ""
  hostname = ""
  omit_hostname = false

# -------------------------
# Çıkış: InfluxDB v2
# -------------------------
[[outputs.influxdb_v2]]
  urls = ["http://influxdb:8086"]
  token = "${INFLUXDB_TOKEN}"
  organization = "${INFLUXDB_ORG}"
  bucket = "${INFLUXDB_BUCKET}"
  timeout = "10s"

# -------------------------
# Girdi: Prometheus metrik endpoint'leri
# -------------------------

## Prometheus (kendisi)
[[inputs.prometheus]]
  urls = ["http://prometheus:9090/metrics"]
  metric_version = 2
  [inputs.prometheus.tags]
    source = "prometheus"

## Node Exporter (sistem metrikleri)
[[inputs.prometheus]]
  urls = ["http://node-exporter:9100/metrics"]
  metric_version = 2
  [inputs.prometheus.tags]
    source = "node-exporter"

## Telegraf kendi dahili metrikleri
[[inputs.internal]]
  collect_memstats = true

# -------------------------
# Girdi: Sistem metrikleri (Telegraf konteyneri)
# -------------------------

## CPU
[[inputs.cpu]]
  percpu = true
  totalcpu = true
  collect_cpu_time = false
  report_active = false

## Disk
[[inputs.disk]]
  ignore_fs = ["tmpfs", "devtmpfs", "devfs", "iso9660", "overlay", "aufs", "squashfs"]

## Bellek
[[inputs.mem]]

## Ağ
[[inputs.net]]
  ignore_protocol_stats = true

## Sistem bilgisi
[[inputs.system]]
