# ============================================================
# Telegraf Konfigürasyonu
# NOT: Proxmox metrikleri InfluxDB'ye doğrudan gönderilir (bu dosyayla ilgisi yok).
#      Telegraf burada yalnızca Docker host sistem metriklerini ve
#      Prometheus endpoint'lerini toplar.
# ============================================================

[global_tags]
  env = "production"

[agent]
  interval = "15s"
  round_interval = true
  metric_batch_size = 1000
  metric_buffer_limit = 10000
  collection_jitter = "2s"
  flush_interval = "15s"
  flush_jitter = "5s"
  precision = ""
  hostname = ""
  omit_hostname = false

# -------------------------
# Çıkış: InfluxDB v2
# -------------------------
[[outputs.influxdb_v2]]
  urls = ["http://influxdb:8086"]
  token = "${INFLUXDB_TOKEN}"
  organization = "${INFLUXDB_ORG}"
  bucket = "${INFLUXDB_BUCKET}"
  timeout = "10s"

# -------------------------
# Girdi: Prometheus endpoint'leri (Docker host servisleri)
# -------------------------

## Prometheus (kendisi)
[[inputs.prometheus]]
  urls = ["http://prometheus:9090/metrics"]
  metric_version = 2
  [inputs.prometheus.tags]
    source = "prometheus"

## Node Exporter (Docker host sistem metrikleri)
[[inputs.prometheus]]
  urls = ["http://node-exporter:9100/metrics"]
  metric_version = 2
  [inputs.prometheus.tags]
    source = "node-exporter"

# -------------------------
# Girdi: Telegraf konteyneri dahili metrikler
# -------------------------
[[inputs.internal]]
  collect_memstats = true

