server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: pfsense_syslog
    syslog:
      listen_address: 0.0.0.0:1514
      listen_protocol: udp
      idle_timeout: 60s
      label_structured_data: true
      labels:
        job: pfsense
        host: pfsense
    relabel_configs:
      - source_labels: [__syslog_message_app_name]
        target_label: app
      - source_labels: [__syslog_message_app_name]
        target_label: service_name
      - source_labels: [__syslog_message_facility]
        target_label: facility
      - source_labels: [__syslog_message_severity]
        target_label: severity
      - source_labels: [__syslog_message_hostname]
        target_label: hostname
      - source_labels: [__syslog_message_proc_id]
        target_label: proc_id

    pipeline_stages:
      # 1. Her app için kategori ata
      - match:
          selector: '{app="filterlog"}'
          stages:
            - static_labels:
                category: firewall
            - regex:
                # Format: rule_id,sub_rule,anchor,tracker,interface,reason,action,direction,version,...
                expression: '^(?P<rule_id>\d*),(?P<sub_rule>[^,]*),(?P<anchor>[^,]*),(?P<tracker>\d*),(?P<interface>[^,]*),(?P<reason>[^,]*),(?P<fw_action>pass|block|match|reject),(?P<fw_direction>in|out),(?P<fw_ipver>[46]),'
            - labels:
                fw_action:
                fw_direction:
                fw_reason:
                fw_ipver:
                interface:

      - match:
          selector: '{app=~"pfb_filter|pfb_dnsbl"}'
          stages:
            - static_labels:
                category: pfblocker

      - match:
          selector: '{app=~"suricata.*"}'
          stages:
            - static_labels:
                category: suricata

      - match:
          selector: '{app=~"haproxy.*|nginx"}'
          stages:
            - static_labels:
                category: haproxy

      - match:
          selector: '{app=~"unbound.*"}'
          stages:
            - static_labels:
                category: dns

      - match:
          selector: '{app=~"kea-dhcp.*|dhcpd.*"}'
          stages:
            - static_labels:
                category: dhcp

      - match:
          selector: '{app=~"dpinger|bandwidthd"}'
          stages:
            - static_labels:
                category: monitoring

      - match:
          selector: '{app=~"igmpproxy|ntpd"}'
          stages:
            - static_labels:
                category: network

      - match:
          selector: '{app=~"php.*"}'
          stages:
            - static_labels:
                category: webgui
            - regex:
                expression: '(?P<php_module>/[^ ]+\.php):\s+Configuration Change:\s+(?P<cfg_user>[^@]+)@(?P<cfg_ip>[\d\.]+)'
            - labels:
                php_module:
                cfg_user:
                cfg_ip:

      - match:
          selector: '{app=~"openvpn.*"}'
          stages:
            - static_labels:
                category: vpn

      - match:
          selector: '{app=~"syslogd.*"}'
          stages:
            - static_labels:
                category: system
