server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:

  # -------------------------------------------------------
  # pfSense + NAS Syslog — UDP 514
  # pfSense: Status → System Logs → Settings →
  #   Remote Logging: IP = <sunucu-IP>, Port = 514, UDP
  # -------------------------------------------------------
  - job_name: pfsense_syslog
    syslog:
      listen_address: 0.0.0.0:1514
      listen_protocol: udp
      idle_timeout: 60s
      label_structured_data: true
      labels:
        job: pfsense
        host: pfsense
    relabel_configs:
      - source_labels: [__syslog_message_hostname]
        target_label: hostname
      - source_labels: [__syslog_message_facility]
        target_label: facility
      - source_labels: [__syslog_message_severity]
        target_label: severity
      - source_labels: [__syslog_message_app_name]
        target_label: app
      - source_labels: [__syslog_message_proc_id]
        target_label: proc_id

    pipeline_stages:

      # --------------------------------------------------
      # 1. pfSense Servis Kategorileri
      # --------------------------------------------------

      # Firewall — paket filtresi
      - match:
          selector: '{service_name="filterlog"}'
          stages:
            - static_labels:
                category: firewall

      # pfBlockerNG — DNSBL + Firewall filtre
      - match:
          selector: '{service_name=~"pfb_filter|pfb_dnsbl"}'
          stages:
            - static_labels:
                category: pfblocker

      # Suricata IDS/IPS
      - match:
          selector: '{service_name=~"suricata.*"}'
          stages:
            - static_labels:
                category: suricata

      # HAProxy Load Balancer (nginx adıyla da gelebilir pfSense'de)
      - match:
          selector: '{service_name=~"haproxy.*|nginx"}'
          stages:
            - static_labels:
                category: haproxy

      # DNS — Unbound + pfBlockerNG DNSBL
      - match:
          selector: '{service_name=~"unbound.*"}'
          stages:
            - static_labels:
                category: dns

      # DHCP — Kea (modern) veya dhcpd (eski)
      - match:
          selector: '{service_name=~"kea-dhcp.*|dhcpd.*"}'
          stages:
            - static_labels:
                category: dhcp

      # Ağ İzleme — dpinger (gateway), bandwidthd
      - match:
          selector: '{service_name=~"dpinger|bandwidthd"}'
          stages:
            - static_labels:
                category: monitoring

      # Ağ Servisleri — igmpproxy, ntpd
      - match:
          selector: '{service_name=~"igmpproxy|ntpd"}'
          stages:
            - static_labels:
                category: network

      # Web GUI / Admin — php config değişiklikleri
      - match:
          selector: '{service_name=~"php.*"}'
          stages:
            - static_labels:
                category: webgui

      # OpenVPN
      - match:
          selector: '{service_name=~"openvpn.*"}'
          stages:
            - static_labels:
                category: vpn

      # Sistem — syslogd vb.
      - match:
          selector: '{service_name=~"syslogd.*"}'
          stages:
            - static_labels:
                category: system


      # --------------------------------------------------
      # 3. Configuration Change parse (kullanıcı + IP + modül)
      # --------------------------------------------------
      - match:
          selector: '{job="pfsense"}'
          stages:
            - regex:
                expression: '(?P<php_module>/[^ ]+\.php):\s+Configuration Change:\s+(?P<cfg_user>[^@]+)@(?P<cfg_ip>[\d\.]+)'
            - labels:
                php_module:
                cfg_user:
                cfg_ip:

      # --------------------------------------------------
      # 4. Firewall (filterlog) — block/pass, direction
      # --------------------------------------------------
      - match:
          selector: '{service_name="filterlog"}'
          stages:
            - regex:
                expression: '^\d+,+(?P<fw_action>pass|block|match|reject),(?P<fw_direction>in|out)'
            - labels:
                fw_action:
                fw_direction:
