server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:

  # -------------------------------------------------------
  # pfSense Syslog — UDP 514
  # pfSense: Status → System Logs → Settings →
  #   Remote Logging: IP = <bu sunucu IP>, Port = 514, UDP
  # -------------------------------------------------------
  - job_name: pfsense_syslog
    syslog:
      listen_address: 0.0.0.0:1514   # container içi port (host'ta 514'e map'lenir)
      listen_protocol: udp
      idle_timeout: 60s
      label_structured_data: true
      labels:
        job: pfsense
        host: pfsense
    relabel_configs:
      # Hostname
      - source_labels: [__syslog_message_hostname]
        target_label: hostname
      # Facility
      - source_labels: [__syslog_message_facility]
        target_label: facility
      # Severity
      - source_labels: [__syslog_message_severity]
        target_label: severity
      # App / process adı (filterlog, php, suricata, openvpn, vs.)
      - source_labels: [__syslog_message_app_name]
        target_label: app
      # Process ID
      - source_labels: [__syslog_message_proc_id]
        target_label: proc_id

    pipeline_stages:

      # --------------------------------------------------
      # 1. pfSense kategori etiketleme (service_name bazlı)
      # --------------------------------------------------
      - match:
          selector: '{service_name=~"suricata.*"}'
          stages:
            - static_labels:
                category: suricata

      - match:
          selector: '{service_name="filterlog"}'
          stages:
            - static_labels:
                category: firewall

      - match:
          selector: '{service_name=~"php.*"}'
          stages:
            - static_labels:
                category: webgui

      - match:
          selector: '{service_name=~"openvpn.*"}'
          stages:
            - static_labels:
                category: vpn

      - match:
          selector: '{service_name=~"dhcp.*"}'
          stages:
            - static_labels:
                category: dhcp

      - match:
          selector: '{service_name=~"unbound.*"}'
          stages:
            - static_labels:
                category: dns

      - match:
          selector: '{service_name=~"nginx|synoproxy|oplogd|confdbsyncd|synoscheduler|synoftp|synosamba.*"}'
          stages:
            - static_labels:
                category: synology

      # --------------------------------------------------
      # 2. Configuration Change parse (kullanıcı + IP)
      # --------------------------------------------------
      - match:
          selector: '{job="pfsense"}'
          stages:
            - regex:
                expression: '(?P<php_module>/[^ ]+\.php):\s+Configuration Change:\s+(?P<cfg_user>[^@]+)@(?P<cfg_ip>[\d\.]+)'
            - labels:
                php_module:
                cfg_user:
                cfg_ip:

      # --------------------------------------------------
      # 3. Firewall (filterlog) — block/pass + direction
      # --------------------------------------------------
      - match:
          selector: '{service_name="filterlog"}'
          stages:
            - regex:
                expression: '^\d+,+(?P<fw_action>pass|block|match|reject),(?P<fw_direction>in|out)'
            - labels:
                fw_action:
                fw_direction:
