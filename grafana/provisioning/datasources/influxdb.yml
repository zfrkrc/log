apiVersion: 1

# NOT: Proxmox, InfluxDB'ye doğrudan veri gönderir (Telegraf gerektirmez).
# Proxmox UI → Datacenter → Metric Server → InfluxDB 2 ayarlarında kullandığın
# org, bucket ve token değerleri aşağıdakilerle eşleşmelidir.

datasources:
  - name: InfluxDB
    type: influxdb
    uid: DS_INFLUXDB          # Dashboard 22559'un beklediği UID
    access: proxy
    url: http://influxdb:8086
    isDefault: false
    version: 1
    editable: true
    jsonData:
      version: Flux            # Dashboard Flux sorgu dili kullanıyor
      organization: myorg
      defaultBucket: metrics
      tlsSkipVerify: true
    secureJsonData:
      token: "8fK2Lm9QxV4rT7wZp3Yc6A!sD@hJkN5bUeG1"

